<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Translator</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto,
          Helvetica, Arial, sans-serif;
        padding: 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #eaeaea;
        border-radius: 12px;
        padding: 16px;
        max-width: 700px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      }
      label {
        display: block;
        font-weight: 600;
        margin: 12px 0 6px;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .btn {
        margin-top: 16px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
      }
      .hint {
        color: #555;
        font-size: 13px;
      }
      .ok {
        color: #0a7a0a;
        font-weight: 600;
      }
      .switch {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
      }
      .switch input[type="checkbox"] {
        width: auto;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Image Text Translator — Options</h2>
      <p class="hint">Choose a provider, configure keys, and default languages.</p>
      <label for="modelProvider">AI Model Provider</label>
      <select id="modelProvider">
        <option value="gemini">Google Gemini</option>
        <option value="openai">OpenAI ChatGPT</option>
        <option value="deepseek">DeepSeek</option>
        <option value="groq">Groq</option>
        <option value="ollama">Ollama (Local)</option>
      </select>

      <div id="geminiApiSection">
        <label for="geminiApiKey">Gemini API Key</label>
        <input id="geminiApiKey" type="password" placeholder="AIza..." />
      </div>
      <div id="openaiApiSection" style="display: none">
        <label for="openaiApiKey">OpenAI API Key</label>
        <input id="openaiApiKey" type="password" placeholder="sk-..." />
      </div>
      <div id="deepseekApiSection" style="display: none">
        <label for="deepseekApiKey">DeepSeek API Key</label>
        <input id="deepseekApiKey" type="password" placeholder="sk-..." />
      </div>
      <div id="groqApiSection" style="display: none">
        <label for="groqApiKey">Groq API Key</label>
        <input id="groqApiKey" type="password" placeholder="gsk_..." />
      </div>
      <div id="ollamaApiSection" style="display: none">
        <label for="ollamaBaseUrl">Ollama Base URL</label>
        <input id="ollamaBaseUrl" type="text" placeholder="http://localhost:11434" />
        <label for="ollamaApiKey">Ollama API Key (Optional)</label>
        <input id="ollamaApiKey" type="password" placeholder="Optional bearer token" />
      </div>

      <div class="row">
        <div>
          <label for="sourceLanguage">Source Language</label>
          <select id="sourceLanguage">
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="auto">Auto-detect</option>
          </select>
        </div>
        <div>
          <label for="targetLanguage">Target Language</label>
          <select id="targetLanguage">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="pt">Portuguese</option>
          </select>
        </div>
      </div>

      <label for="model">Model</label>
      <select id="model">
        <option value="gemini-1.5-flash" data-provider="gemini">gemini-1.5-flash</option>
        <option value="gemini-1.5-pro" data-provider="gemini">gemini-1.5-pro</option>
        <option value="gpt-4o" data-provider="openai" style="display: none">gpt-4o</option>
        <option value="gpt-4o-mini" data-provider="openai" style="display: none">gpt-4o-mini</option>
        <option value="deepseek-chat" data-provider="deepseek" style="display: none">deepseek-chat</option>
        <option value="meta-llama/llama-4-scout-17b-16e-instruct" data-provider="groq" style="display: none">llama-4-scout</option>
        <option value="llava:latest" data-provider="ollama" style="display: none">llava:latest</option>
      </select>

      <p class="hint">
        Overlay text and background colors are detected automatically for readability.
      </p>

      <p class="hint">
        Use the extension popup: <strong>Translate Once</strong> for the current page, or
        <strong>Translate as I Scroll</strong> for infinite / lazy-loaded pages.
      </p>
      <div class="switch">
        <input id="compactOverlayMode" type="checkbox" />
        <label for="compactOverlayMode" style="margin: 0"
          >Compact overlay mode (for dense manga pages)</label
        >
      </div>
      <div class="switch">
        <input id="replaceTextBlocks" type="checkbox" />
        <label for="replaceTextBlocks" style="margin: 0"
          >Replace original text blocks (hide source text)</label
        >
      </div>
      <div class="switch">
        <input id="autoTranslateThenEdit" type="checkbox" />
        <label for="autoTranslateThenEdit" style="margin: 0"
          >Auto-translate then allow inline English edits</label
        >
      </div>

      <button id="save" class="btn">Save</button>
      <span id="status" class="ok" style="margin-left: 8px"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
